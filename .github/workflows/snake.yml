name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Meetnakrani007
          outputs: |
            dist/github-contribution-grid-snake.svg?speed=2&color_snake=#7C3AED&color_dots=#1a1b27,#1f4b2e,#2e6b3e,#3a8f52,#4db36a
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&speed=2&color_snake=#7C3AED

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
